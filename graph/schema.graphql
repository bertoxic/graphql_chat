scalar Time

type  User {
    id: String!
    username: String!
    email: String!
    createdAt: Time!
}
type AuthResponse{
    accessToken: String!
    user:User!
}
input RegisterInput{
    username: String!
    password: String!
    email:String!
}

input LoginInput{
    email: String!
    password:String!
}

type Query{
    getUserByEmail: AuthResponse
}
type Mutation{
    register(input: RegisterInput!):AuthResponse!
    login(input:LoginInput!):AuthResponse!
}